{% extends "base.html" %}

{% block title %}{{ t('heatmap_title', lang) }} — Aramaic Root Atlas{% endblock %}

{% block head %}
<style>
.heatmap-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
}
.heatmap-controls label { font-weight: 500; }
.heatmap-controls select, .heatmap-controls input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--fg);
}
.heatmap-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
.heatmap-table th {
    background: var(--accent);
    color: #fff;
    padding: 8px 12px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
}
.heatmap-table th:hover { opacity: 0.9; }
.heatmap-table th .sort-arrow { margin-left: 4px; font-size: 0.7em; }
.heatmap-table td {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
}
.heatmap-table tr:hover { background: var(--accent-light); }
.heatmap-table .root-cell {
    font-family: var(--syriac-font);
    font-size: 1.1rem;
    direction: rtl;
}
.heatmap-table .translit-cell {
    font-family: monospace;
    font-size: 0.85rem;
}
.heatmap-table .count-cell {
    text-align: right;
    font-variant-numeric: tabular-nums;
}
.heat-0 { color: var(--muted); }
.heat-1 { background: rgba(44,95,124,0.08); }
.heat-2 { background: rgba(44,95,124,0.18); }
.heat-3 { background: rgba(44,95,124,0.30); }
.heat-4 { background: rgba(44,95,124,0.45); color: #fff; }
.heat-5 { background: rgba(44,95,124,0.65); color: #fff; }
.heatmap-info {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 12px;
}
.heatmap-export {
    margin-left: auto;
}
.heatmap-export button {
    padding: 6px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
}
.show-more-wrap {
    text-align: center;
    margin: 20px 0;
}
.show-more-btn {
    padding: 10px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.95rem;
}
.show-more-btn:hover { opacity: 0.9; }
.show-more-info {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 6px;
}
</style>
{% endblock %}

{% block content %}
<h1 style="margin-bottom: 4px;">{{ t('heatmap_title', lang) }}</h1>
<p class="heatmap-info">{{ t('heatmap_desc', lang) }}</p>

<div class="heatmap-controls">
    <label>{{ t('show', lang) }}:</label>
    <select id="hm-limit" onchange="loadHeatmap()">
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
        <option value="0">All</option>
    </select>
    <label>roots</label>
    <input type="text" id="hm-filter" placeholder="Filter roots (e.g. SH-L-M, peace, ܫܠܡ)" oninput="filterHeatmap()" style="min-width:260px">
    <div class="heatmap-export">
        <button onclick="exportHeatmapCSV()"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">download</span> CSV</button>
        <button onclick="exportHeatmapJSON()"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">download</span> JSON</button>
    </div>
</div>

<div id="heatmap-results"></div>
{% endblock %}

{% block scripts %}
<script>
var _hmData = null;
var _hmAllRoots = [];
var _hmCorpora = [];
var _hmMaxCounts = {};
var _hmDisplayed = 0;
var _hmPageSize = 100;
var _hmSort = 'total';

var CORPUS_LABELS = {
    'peshitta_nt': 'Peshitta NT',
    'peshitta_ot': 'Peshitta OT',
    'biblical_aramaic': 'Biblical Aramaic',
    'targum_onkelos': 'Targum Onkelos'
};

async function loadHeatmap(sortCol) {
    if (sortCol) _hmSort = sortCol;
    var el = document.getElementById('heatmap-results');
    el.innerHTML = '<p>Loading...</p>';

    var limit = document.getElementById('hm-limit').value;
    var res = await fetch('/api/heatmap?limit=' + limit + '&sort=' + _hmSort);
    var data = await res.json();
    _hmData = data;
    _hmAllRoots = data.roots;
    _hmCorpora = data.corpora;
    _hmDisplayed = 0;

    _hmMaxCounts = {};
    for (var c of _hmCorpora) {
        _hmMaxCounts[c] = Math.max.apply(null, _hmAllRoots.map(function(r) { return r[c] || 0; }));
    }

    var html = '<table class="heatmap-table"><thead><tr>';
    html += '<th onclick="loadHeatmap(\'root\')">Root <span class="sort-arrow">' + (_hmSort === 'root' ? '▼' : '') + '</span></th>';
    html += '<th>Translit</th>';
    html += '<th>Gloss</th>';
    html += '<th onclick="loadHeatmap(\'total\')">Total <span class="sort-arrow">' + (_hmSort === 'total' ? '▼' : '') + '</span></th>';
    for (var c of _hmCorpora) {
        html += '<th onclick="loadHeatmap(\'' + c + '\')">' + (CORPUS_LABELS[c] || c) + ' <span class="sort-arrow">' + (_hmSort === c ? '▼' : '') + '</span></th>';
    }
    html += '</tr></thead><tbody id="hm-tbody"></tbody></table>';
    html += '<div id="hm-show-more"></div>';
    el.innerHTML = html;

    showMoreRows();
}

function showMoreRows() {
    var tbody = document.getElementById('hm-tbody');
    var source = _hmFilteredRoots || _hmAllRoots;
    var end = Math.min(_hmDisplayed + _hmPageSize, source.length);

    var html = '';
    for (var i = _hmDisplayed; i < end; i++) {
        var r = source[i];
        html += '<tr>';
        var vizKey = r.root_translit.replace(/'/g, 'A');
        html += '<td class="root-cell"><a href="/visualize/' + vizKey + '" style="text-decoration:none;color:inherit" title="Visualize ' + r.root_translit + '">' + r.root + '</a></td>';
        html += '<td class="translit-cell">' + r.root_translit + '</td>';
        html += '<td>' + (r.gloss || '') + '</td>';
        html += '<td class="count-cell"><strong>' + r.total + '</strong></td>';
        for (var c of _hmCorpora) {
            var count = r[c] || 0;
            var max = _hmMaxCounts[c] || 1;
            var level = count === 0 ? 0 : Math.min(5, Math.ceil((count / max) * 5));
            html += '<td class="count-cell heat-' + level + '">' + (count || '—') + '</td>';
        }
        html += '</tr>';
    }
    tbody.insertAdjacentHTML('beforeend', html);
    _hmDisplayed = end;

    var moreEl = document.getElementById('hm-show-more');
    if (_hmDisplayed < source.length) {
        var remaining = source.length - _hmDisplayed;
        moreEl.innerHTML = '<div class="show-more-wrap">' +
            '<button class="show-more-btn" onclick="showMoreRows()">Show more</button>' +
            '<div class="show-more-info">Showing ' + _hmDisplayed + ' of ' + source.length + ' roots (' + remaining + ' remaining)</div>' +
            '</div>';
    } else {
        moreEl.innerHTML = '<p class="heatmap-info" style="text-align:center">Showing all ' + source.length + ' roots</p>';
    }
}

function filterHeatmap() {
    var q = document.getElementById('hm-filter').value.trim().toLowerCase().replace(/-/g, '');
    if (!q) {
        // Reset to full view
        _hmDisplayed = 0;
        var tbody = document.getElementById('hm-tbody');
        if (tbody) tbody.innerHTML = '';
        _hmFilteredRoots = null;
        showMoreRows();
        return;
    }
    var filtered = _hmAllRoots.filter(function(r) {
        var translit = (r.root_translit || '').toLowerCase().replace(/-/g, '');
        var gloss = (r.gloss || '').toLowerCase();
        var root = r.root || '';
        return translit.indexOf(q) >= 0 || gloss.indexOf(q) >= 0 || root.indexOf(q) >= 0;
    });
    _hmFilteredRoots = filtered;
    _hmDisplayed = 0;
    var tbody = document.getElementById('hm-tbody');
    if (tbody) tbody.innerHTML = '';
    showMoreRows();
}

var _hmFilteredRoots = null;

function exportHeatmapCSV() {
    if (!_hmData) return;
    var corpora = _hmData.corpora;
    var csv = 'Root,Transliteration,Gloss,Total,' + corpora.map(function(c) { return CORPUS_LABELS[c] || c; }).join(',') + '\n';
    for (var r of _hmData.roots) {
        csv += '"' + r.root + '","' + r.root_translit + '","' + (r.gloss || '').replace(/"/g, '""') + '",' + r.total;
        for (var c of corpora) csv += ',' + (r[c] || 0);
        csv += '\n';
    }
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'root_heatmap.csv';
    a.click();
}

function exportHeatmapJSON() {
    if (!_hmData) return;
    var blob = new Blob([JSON.stringify(_hmData, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'root_heatmap.json';
    a.click();
}

loadHeatmap();
</script>
{% endblock %}
