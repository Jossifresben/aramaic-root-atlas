{% extends "base.html" %}

{% block title %}Browse — Aramaic Root Atlas{% endblock %}

{% block content %}
<h1>Browse Corpora</h1>

<div class="corpus-filter-bar">
    <a href="/browse?lang={{ lang }}" class="{% if not corpus_filter %}active{% endif %}">All</a>
    <a href="/browse?lang={{ lang }}&corpus=peshitta_nt" class="{% if corpus_filter == 'peshitta_nt' %}active{% endif %}">Peshitta NT</a>
    <a href="/browse?lang={{ lang }}&corpus=peshitta_ot" class="{% if corpus_filter == 'peshitta_ot' %}active{% endif %}">Peshitta OT</a>
</div>

<div class="books-grid">
    {% for book_name, max_ch in books %}
    <div class="book-card">
        <h3><a href="/read/{{ book_name }}/1?lang={{ lang }}">{{ book_name }}</a></h3>
        <div class="chapter-links">
            {% for ch in range(1, max_ch + 1) %}
            <a href="/read/{{ book_name }}/{{ ch }}?lang={{ lang }}">{{ ch }}</a>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
